spring:
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false

logging:
  level:
    com.muhabbet: INFO
    org.springframework: WARN
    org.hibernate: WARN
  # JSON structured logging for production
  pattern:
    console: '{"timestamp":"%d{yyyy-MM-dd HH:mm:ss.SSS}","level":"%level","logger":"%logger{36}","thread":"%thread","message":"%msg"}%n'

management:
  endpoint:
    health:
      # when-authorized: unauthenticated callers see only {status: UP/DOWN}; full DB/Redis/disk/SSL
      # component detail is no longer leaked to the public internet (P0-6).
      show-details: when-authorized
      show-components: when-authorized

sentry:
  dsn: ${SENTRY_DSN:}

muhabbet:
  otp:
    mock-enabled: ${OTP_MOCK_ENABLED:false}
  fcm:
    enabled: ${FCM_ENABLED:true}
