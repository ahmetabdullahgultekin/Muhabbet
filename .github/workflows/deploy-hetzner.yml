name: Deploy to Hetzner VPS

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'shared/**'
      - 'Dockerfile*'
      - 'docker-compose.prod.yml'
  workflow_dispatch:

concurrency:
  group: deploy-muhabbet
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Muhabbet
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        timeout-minutes: 8
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 6m
          script: |
            set -e
            cd /opt/projects/Muhabbet
            git pull origin main
            cd /opt/projects
            ./infra/deploy.sh build muhabbet
            ./infra/deploy.sh restart muhabbet
            # Health check with retries (Spring Boot startup ~30s)
            for i in 1 2 3 4 5; do
              sleep 15
              if curl -sf https://muhabbet-api.rollingcatsoftware.com/actuator/health > /dev/null 2>&1; then
                echo "API healthy after attempt $i"
                break
              fi
              echo "Attempt $i: API not ready yet..."
              if [ "$i" = "5" ]; then echo "Health check failed after 75s" && exit 1; fi
            done
            echo "Muhabbet deployed successfully"
