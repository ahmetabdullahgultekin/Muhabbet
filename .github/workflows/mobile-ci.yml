name: Mobile CI

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
    paths:
      - 'mobile/**'
      - 'shared/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - 'gradle/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'mobile/**'
      - 'shared/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - 'gradle/**'

env:
  JAVA_VERSION: '21'
  GRADLE_OPTS: '-Dorg.gradle.daemon=false'

jobs:
  # ─── Android Build ──────────────────────────
  android-build:
    name: Android Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/develop' }}

      - name: Inject google-services.json
        run: |
          mkdir -p mobile/composeApp
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > mobile/composeApp/google-services.json
            echo "Using real google-services.json from secret"
          else
            cat > mobile/composeApp/google-services.json << 'GSEOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "muhabbet-ci-dummy",
              "storage_bucket": "muhabbet-ci-dummy.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                  "android_client_info": { "package_name": "com.muhabbet.app" }
                },
                "api_key": [{ "current_key": "CI_DUMMY_KEY" }]
              }
            ],
            "configuration_version": "1"
          }
          GSEOF
            echo "WARNING: Using dummy google-services.json — Firebase Phone Auth will not work in this build"
          fi

      - name: Build shared module
        run: ./gradlew :shared:jvmJar :shared:assembleRelease

      - name: Build Android debug APK
        run: ./gradlew :mobile:composeApp:assembleDebug

      - name: Print debug keystore SHA-1 (register this in Firebase Console)
        run: |
          KEYSTORE=$(find ~ /root /home -name "debug.keystore" 2>/dev/null | head -1)
          if [ -n "$KEYSTORE" ]; then
            echo "Found keystore at: $KEYSTORE"
            keytool -list -v \
              -keystore "$KEYSTORE" \
              -alias androiddebugkey \
              -storepass android \
              -keypass android 2>/dev/null | grep -E "SHA1:|SHA256:"
          else
            echo "Generating debug keystore to extract SHA-1..."
            mkdir -p ~/.android
            keytool -genkeypair -v \
              -keystore ~/.android/debug.keystore \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 \
              -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=Android Debug,O=Android,C=US" 2>/dev/null
            keytool -list -v \
              -keystore ~/.android/debug.keystore \
              -alias androiddebugkey \
              -storepass android \
              -keypass android 2>/dev/null | grep -E "SHA1:|SHA256:"
          fi

      - name: Run Android lint
        run: ./gradlew :mobile:composeApp:lintDebug
        continue-on-error: true

      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-lint-results
          path: mobile/composeApp/build/reports/lint-results-*.html
          retention-days: 14

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: mobile/composeApp/build/outputs/apk/debug/*.apk
          retention-days: 7

  # ─── iOS Framework Build ────────────────────
  ios-framework:
    name: iOS Framework Build
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/develop' }}

      - name: Build shared iOS framework
        run: ./gradlew :shared:linkReleaseFrameworkIosSimulatorArm64
        env:
          SKIP_MOBILE: 'true'

      - name: Build CMP iOS framework
        run: ./gradlew :mobile:composeApp:linkReleaseFrameworkIosSimulatorArm64
        env:
          GRADLE_OPTS: '-Dorg.gradle.daemon=false'
