name: Mobile CI

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
    paths:
      - 'mobile/**'
      - 'shared/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - 'gradle/**'
      - '.github/workflows/mobile-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'mobile/**'
      - 'shared/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - 'gradle/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'
  GRADLE_OPTS: '-Dorg.gradle.daemon=false'

jobs:
  # --- Android Build ---
  android-build:
    name: Android Build
    runs-on: [self-hosted, linux, x64]

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/develop' }}

      - name: Inject stable debug keystore
        run: |
          if [ -n "${{ secrets.DEBUG_KEYSTORE }}" ]; then
            for dir in "${ANDROID_USER_HOME:-}" "$HOME/.android" "$HOME/.config/.android"; do
              [ -z "$dir" ] && continue
              mkdir -p "$dir"
              echo "${{ secrets.DEBUG_KEYSTORE }}" | base64 --decode > "$dir/debug.keystore"
              echo "Wrote keystore to $dir/debug.keystore"
            done
          fi

      - name: Inject google-services.json
        run: |
          mkdir -p mobile/composeApp
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > mobile/composeApp/google-services.json
            echo "Using real google-services.json from secret"
          else
            cat > mobile/composeApp/google-services.json << 'GSEOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "muhabbet-ci-dummy",
              "storage_bucket": "muhabbet-ci-dummy.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                  "android_client_info": { "package_name": "com.muhabbet.app" }
                },
                "api_key": [{ "current_key": "CI_DUMMY_KEY" }]
              }
            ],
            "configuration_version": "1"
          }
          GSEOF
            echo "WARNING: Using dummy google-services.json — Firebase Phone Auth will not work in this build"
          fi

      - name: Build shared module
        run: ./gradlew :shared:jvmJar :shared:assembleRelease

      - name: Build Android debug APK
        run: ./gradlew :mobile:composeApp:assembleDebug

      - name: Print APK signing certificate SHA-1 (register this in Firebase Console)
        run: |
          APK=$(find mobile/composeApp/build/outputs/apk/debug -name "*.apk" | head -1)
          if [ -n "$APK" ]; then
            echo "=== APK Signing Certificate ==="
            echo "APK: $APK"
            APKSIGNER=$(find $ANDROID_HOME/build-tools -name "apksigner" | sort -V | tail -1)
            if [ -n "$APKSIGNER" ]; then
              "$APKSIGNER" verify --print-certs "$APK" 2>&1 | grep -i "SHA-1\|SHA-256\|certificate DN"
            fi
            echo "=== Fallback: all debug keystores ==="
            find / -name "debug.keystore" 2>/dev/null | while read ks; do
              echo "Keystore: $ks"
              keytool -list -v -keystore "$ks" -alias androiddebugkey -storepass android -keypass android 2>/dev/null | grep -E "SHA1:|SHA256:"
            done
            echo "================================"
            echo "Register the SHA1 above in Firebase Console"
          else
            echo "ERROR: No debug APK found"
          fi
        continue-on-error: true

      - name: Run Android lint
        run: ./gradlew :mobile:composeApp:lintDebug
        continue-on-error: true

      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-lint-results
          path: mobile/composeApp/build/reports/lint-results-*.html
          retention-days: 14

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: mobile/composeApp/build/outputs/apk/debug/*.apk
          retention-days: 7

  # --- iOS Framework Build ---
  ios-framework:
    name: iOS Framework Build
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/develop' }}

      - name: Build shared iOS framework
        run: ./gradlew :shared:linkReleaseFrameworkIosSimulatorArm64
        env:
          SKIP_MOBILE: 'true'

      - name: Build CMP iOS framework
        run: ./gradlew :mobile:composeApp:linkReleaseFrameworkIosSimulatorArm64
        env:
          GRADLE_OPTS: '-Dorg.gradle.daemon=false'
